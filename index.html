<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .container h1, .container h2 {
            margin-bottom: 1rem;
        }
        .container input, .container button, .container textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #334155;
            border-radius: 4px;
            background-color: #334155;
            color: #ffffff;
        }
        .container button {
            background-color: #6366f1;
            cursor: pointer;
            border: none;
        }
        .container button:hover {
            opacity: 0.9;
        }
        .container a {
            color: #6366f1;
            text-decoration: none;
        }
        .container a:hover {
            text-decoration: underline;
        }
        .free-limit {
            margin-top: 1rem;
            color: #d97706;
        }
        .related-tools {
            margin-top: 2rem;
        }
        .related-tools h3 {
            margin-bottom: 1rem;
        }
        .related-tools ul {
            list-style-type: none;
            padding: 0;
        }
        .related-tools li {
            background-color: #334155;
            margin-bottom: 0.5rem;
            padding: 0.8rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script>
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            POSTHOG_API_KEY: 'your-posthog-api-key'
        };
    </script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const posthog = window.posthog || [];
        posthog.init(CONFIG.POSTHOG_API_KEY, { api_host: 'https://app.posthog.com' });

        const App = () => {
            const [view, setView] = useState('landing');
            const [clientName, setClientName] = useState('');
            const [services, setServices] = useState('');
            const [amounts, setAmounts] = useState('');
            const [uses, setUses] = useState(0);
            const [email, setEmail] = useState('');
            const [price, setPrice] = useState('$9/mo');
            const [relatedTools, setRelatedTools] = useState([]);

            useEffect(() => {
                fetch('https://raw.githubusercontent.com/Ammumammu/agent-os/main/public/portfolio.json')
                    .then(response => response.json())
                    .then(data => {
                        setRelatedTools(data.slice(0, 3));
                    });
                posthog.onFeatureFlags(function () {
                    if (posthog.isFeatureEnabled('price-test-ab')) {
                        setPrice('$14/mo');
                    }
                });
            }, []);

            const handleInvoiceGenerate = async () => {
                posthog.capture('tool_used');
                if (uses >= 3) {
                    setView('paywall');
                    posthog.capture('free_limit_hit');
                    return;
                }
                const response = await fetch('https://api.groq.com/v1/embeddings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        prompt: `Generate a professional invoice for ${clientName}. Services: ${services}. Amounts: ${amounts}. Include branding, payment terms, and late fee clause. Generated by Invoice Generator Pro — invoice-generator-pro.vercel.app`
                    })
                });
                const data = await response.json();
                console.log(data);
                alert('Invoice generated! Check console for details.');
                setUses(uses + 1);
            };

            const handleEmailCapture = () => {
                posthog.capture('email_captured', { email });
                alert('Email captured! You get 3 more free uses.');
                setUses(0);
                setView('landing');
            };

            return (
                <div className="container">
                    {view === 'landing' && (
                        <>
                            <h1>Late Payments Hurt</h1>
                            <h2>Freelancers create invoices in 15 seconds</h2>
                            <p>Enter client info (5 sec) → Add services and amounts (10 sec) → Get instant professional invoice</p>
                            <button onClick={() => { setView('tool'); posthog.capture('tool_opened'); }}>Invoice Now</button>
                        </>
                    )}
                    {view === 'tool' && (
                        <>
                            <h1>Create Your Invoice</h1>
                            <input type="text" placeholder="Client Name" value={clientName} onChange={(e) => setClientName(e.target.value)} />
                            <textarea placeholder="Services" value={services} onChange={(e) => setServices(e.target.value)} />
                            <textarea placeholder="Amounts" value={amounts} onChange={(e) => setAmounts(e.target.value)} />
                            <button onClick={handleInvoiceGenerate}>Generate Invoice</button>
                            {uses >= 3 && <div className="free-limit">You have reached the free limit. Please upgrade.</div>}
                        </>
                    )}
                    {view === 'paywall' && (
                        <>
                            <h1>Upgrade to Invoice Generator Pro</h1>
                            <p>Get unlimited invoices and more features for {price}</p>
                            <input type="email" placeholder="Enter your email" value={email} onChange={(e) => setEmail(e.target.value)} />
                            <button onClick={handleEmailCapture}>Get 3 Free Uses</button>
                            <a href="https://buy.stripe.com/test_dRmcMY13434i4DI8oHg7e0k" onClick={() => posthog.capture('payment_clicked')}>Upgrade</a>
                            <a href="https://buy.stripe.com/test_dRmcMY13434i4DI8oHg7e0k" onClick={() => posthog.capture('payment_clicked')}>Buy via Gumroad</a>
                            <div className="related-tools">
                                <h3>Related Tools</h3>
                                <ul>
                                    {relatedTools.map((tool, index) => (
                                        <li key={index}>{tool.name}</li>
                                    ))}
                                </ul>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
